<svg xmlns="http://www.w3.org/2000/svg" width="432" height="432" viewBox="0 0 432 432">
  <!-- Adaptive icon foreground: safe zone is inner 66% (~143-289) -->
  <!-- Scale down to fit comfortably within safe zone -->
  <g transform="translate(216,216) scale(0.6) translate(-256,-256)">
    <!-- Chip body -->
    <rect x="136" y="176" width="240" height="220" rx="20" fill="none" stroke="#FF8C00" stroke-width="8"/>
    <!-- Chip pins - bottom -->
    <line x1="196" y1="396" x2="196" y2="432" stroke="#FF8C00" stroke-width="8" stroke-linecap="round"/>
    <line x1="256" y1="396" x2="256" y2="432" stroke="#FF8C00" stroke-width="8" stroke-linecap="round"/>
    <line x1="316" y1="396" x2="316" y2="432" stroke="#FF8C00" stroke-width="8" stroke-linecap="round"/>
    <!-- Chip pins - left -->
    <line x1="136" y1="236" x2="100" y2="236" stroke="#FF8C00" stroke-width="8" stroke-linecap="round"/>
    <line x1="136" y1="296" x2="100" y2="296" stroke="#FF8C00" stroke-width="8" stroke-linecap="round"/>
    <line x1="136" y1="356" x2="100" y2="356" stroke="#FF8C00" stroke-width="8" stroke-linecap="round"/>
    <!-- Chip pins - right -->
    <line x1="376" y1="236" x2="412" y2="236" stroke="#FF8C00" stroke-width="8" stroke-linecap="round"/>
    <line x1="376" y1="296" x2="412" y2="296" stroke="#FF8C00" stroke-width="8" stroke-linecap="round"/>
    <line x1="376" y1="356" x2="412" y2="356" stroke="#FF8C00" stroke-width="8" stroke-linecap="round"/>
    <!-- Chip pins - top -->
    <line x1="196" y1="176" x2="196" y2="140" stroke="#FF8C00" stroke-width="8" stroke-linecap="round"/>
    <line x1="256" y1="176" x2="256" y2="140" stroke="#FF8C00" stroke-width="8" stroke-linecap="round"/>
    <line x1="316" y1="176" x2="316" y2="140" stroke="#FF8C00" stroke-width="8" stroke-linecap="round"/>
    <!-- Download arrow going into chip -->
    <line x1="256" y1="72" x2="256" y2="300" stroke="#FF8C00" stroke-width="14" stroke-linecap="round"/>
    <polygon points="256,320 216,264 296,264" fill="#FF8C00"/>
    <!-- Landing pad -->
    <line x1="192" y1="360" x2="320" y2="360" stroke="#FF8C00" stroke-width="8" stroke-linecap="round" opacity="0.5"/>
  </g>
</svg>
