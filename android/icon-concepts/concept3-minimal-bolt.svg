<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- Concept 3: Clean minimal — large bolt on chip die -->
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A1E24"/>
      <stop offset="100%" stop-color="#0D1117"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg3)"/>
  <!-- Outer chip outline -->
  <rect x="100" y="100" width="312" height="312" rx="20" fill="none" stroke="#30363D" stroke-width="8"/>
  <!-- Inner die -->
  <rect x="156" y="156" width="200" height="200" rx="12" fill="#161B22" stroke="#FF8C00" stroke-width="4"/>
  <!-- Large centered flash bolt -->
  <polygon points="280,176 216,280 260,280 232,336 296,232 252,232" fill="#FF8C00"/>
  <!-- Corner dots (bond pads) -->
  <circle cx="120" cy="120" r="8" fill="#FF8C00" opacity="0.5"/>
  <circle cx="392" cy="120" r="8" fill="#FF8C00" opacity="0.5"/>
  <circle cx="120" cy="392" r="8" fill="#FF8C00" opacity="0.5"/>
  <circle cx="392" cy="392" r="8" fill="#FF8C00" opacity="0.5"/>
  <!-- Pin stubs -->
  <line x1="200" y1="100" x2="200" y2="72" stroke="#30363D" stroke-width="8" stroke-linecap="round"/>
  <line x1="256" y1="100" x2="256" y2="72" stroke="#30363D" stroke-width="8" stroke-linecap="round"/>
  <line x1="312" y1="100" x2="312" y2="72" stroke="#30363D" stroke-width="8" stroke-linecap="round"/>
  <line x1="200" y1="412" x2="200" y2="440" stroke="#30363D" stroke-width="8" stroke-linecap="round"/>
  <line x1="256" y1="412" x2="256" y2="440" stroke="#30363D" stroke-width="8" stroke-linecap="round"/>
  <line x1="312" y1="412" x2="312" y2="440" stroke="#30363D" stroke-width="8" stroke-linecap="round"/>
  <line x1="100" y1="200" x2="72" y2="200" stroke="#30363D" stroke-width="8" stroke-linecap="round"/>
  <line x1="100" y1="256" x2="72" y2="256" stroke="#30363D" stroke-width="8" stroke-linecap="round"/>
  <line x1="100" y1="312" x2="72" y2="312" stroke="#30363D" stroke-width="8" stroke-linecap="round"/>
  <line x1="412" y1="200" x2="440" y2="200" stroke="#30363D" stroke-width="8" stroke-linecap="round"/>
  <line x1="412" y1="256" x2="440" y2="256" stroke="#30363D" stroke-width="8" stroke-linecap="round"/>
  <line x1="412" y1="312" x2="440" y2="312" stroke="#30363D" stroke-width="8" stroke-linecap="round"/>
</svg>
