<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- Concept 7: Chip with circular arrows — reflash/restore -->
  <defs>
    <linearGradient id="bg7" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#161B22"/>
      <stop offset="100%" stop-color="#0D1117"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg7)"/>
  <!-- Chip body (smaller, centered) -->
  <rect x="176" y="176" width="160" height="160" rx="16" fill="none" stroke="#FF8C00" stroke-width="8"/>
  <!-- Chip pins -->
  <line x1="216" y1="176" x2="216" y2="148" stroke="#FF8C00" stroke-width="7" stroke-linecap="round"/>
  <line x1="256" y1="176" x2="256" y2="148" stroke="#FF8C00" stroke-width="7" stroke-linecap="round"/>
  <line x1="296" y1="176" x2="296" y2="148" stroke="#FF8C00" stroke-width="7" stroke-linecap="round"/>
  <line x1="216" y1="336" x2="216" y2="364" stroke="#FF8C00" stroke-width="7" stroke-linecap="round"/>
  <line x1="256" y1="336" x2="256" y2="364" stroke="#FF8C00" stroke-width="7" stroke-linecap="round"/>
  <line x1="296" y1="336" x2="296" y2="364" stroke="#FF8C00" stroke-width="7" stroke-linecap="round"/>
  <line x1="176" y1="216" x2="148" y2="216" stroke="#FF8C00" stroke-width="7" stroke-linecap="round"/>
  <line x1="176" y1="256" x2="148" y2="256" stroke="#FF8C00" stroke-width="7" stroke-linecap="round"/>
  <line x1="176" y1="296" x2="148" y2="296" stroke="#FF8C00" stroke-width="7" stroke-linecap="round"/>
  <line x1="336" y1="216" x2="364" y2="216" stroke="#FF8C00" stroke-width="7" stroke-linecap="round"/>
  <line x1="336" y1="256" x2="364" y2="256" stroke="#FF8C00" stroke-width="7" stroke-linecap="round"/>
  <line x1="336" y1="296" x2="364" y2="296" stroke="#FF8C00" stroke-width="7" stroke-linecap="round"/>
  <!-- Circular arrows around chip -->
  <path d="M256,88 A168,168 0 0,1 424,256" fill="none" stroke="#FF8C00" stroke-width="12" stroke-linecap="round"/>
  <polygon points="424,256 404,224 440,232" fill="#FF8C00"/>
  <path d="M256,424 A168,168 0 0,1 88,256" fill="none" stroke="#FF8C00" stroke-width="12" stroke-linecap="round"/>
  <polygon points="88,256 108,288 72,280" fill="#FF8C00"/>
</svg>
