name: Build

on:
  push:
    tags: ['v*']
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-linux-x86_64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libusb-1.0-0-dev zlib1g-dev

      - name: Build
        run: |
          mkdir -p build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          make -j$(nproc)

      - name: Run tests
        run: cd build && ctest --output-on-failure

      - name: Package
        run: |
          mkdir -p dist/thingino-dfu-linux-x86_64
          cp build/cli/thingino-dfu dist/thingino-dfu-linux-x86_64/
          [ -f build/dfu-remote/dfu-remote ] && cp build/dfu-remote/dfu-remote dist/thingino-dfu-linux-x86_64/ || true
          cp -r firmware dist/thingino-dfu-linux-x86_64/
          cd dist && tar czf thingino-dfu-linux-x86_64.tar.gz thingino-dfu-linux-x86_64

      - uses: actions/upload-artifact@v7
        with:
          name: thingino-dfu-linux-x86_64
          path: dist/thingino-dfu-linux-x86_64.tar.gz

  build-linux-aarch64:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libusb-1.0-0-dev zlib1g-dev

      - name: Build
        run: |
          mkdir -p build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          make -j$(nproc)

      - name: Run tests
        run: cd build && ctest --output-on-failure

      - name: Package
        run: |
          mkdir -p dist/thingino-dfu-linux-aarch64
          cp build/cli/thingino-dfu dist/thingino-dfu-linux-aarch64/
          [ -f build/dfu-remote/dfu-remote ] && cp build/dfu-remote/dfu-remote dist/thingino-dfu-linux-aarch64/ || true
          cp -r firmware dist/thingino-dfu-linux-aarch64/
          cd dist && tar czf thingino-dfu-linux-aarch64.tar.gz thingino-dfu-linux-aarch64

      - uses: actions/upload-artifact@v7
        with:
          name: thingino-dfu-linux-aarch64
          path: dist/thingino-dfu-linux-aarch64.tar.gz

  build-windows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-mingw-w64-x86-64 p7zip-full

      - name: Build
        run: make win64

      - name: Package
        run: |
          mkdir -p dist/thingino-dfu-windows-x64
          cp build-win64/cli/thingino-dfu.exe dist/thingino-dfu-windows-x64/
          cp build-win64/dfu-remote/dfu-remote.exe dist/thingino-dfu-windows-x64/
          cp build-win64/cli/libusb-1.0.dll dist/thingino-dfu-windows-x64/
          cp -r firmware dist/thingino-dfu-windows-x64/
          cd dist && zip -r thingino-dfu-windows-x64.zip thingino-dfu-windows-x64

      - uses: actions/upload-artifact@v7
        with:
          name: thingino-dfu-windows-x64
          path: dist/thingino-dfu-windows-x64.zip

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: brew install pkg-config

      - name: Build libusb universal (static)
        run: |
          curl -sL https://github.com/libusb/libusb/releases/download/v1.0.27/libusb-1.0.27.tar.bz2 | tar xj
          cd libusb-1.0.27
          ./configure --disable-dependency-tracking --enable-static --disable-shared CFLAGS="-arch arm64 -arch x86_64" LDFLAGS="-arch arm64 -arch x86_64" --prefix=$PWD/../libusb-universal
          make -j$(sysctl -n hw.ncpu) && make install

      - name: Build universal binary
        run: |
          mkdir -p build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64" \
            -DCMAKE_PREFIX_PATH=$PWD/../libusb-universal
          make -j$(sysctl -n hw.ncpu)

      - name: Verify universal binary
        run: file build/cli/thingino-dfu

      - name: Run tests
        run: cd build && ctest --output-on-failure

      - name: Package
        run: |
          mkdir -p dist/thingino-dfu-macos-universal
          cp build/cli/thingino-dfu dist/thingino-dfu-macos-universal/
          cp -r firmware dist/thingino-dfu-macos-universal/
          cd dist && tar czf thingino-dfu-macos-universal.tar.gz thingino-dfu-macos-universal

      - uses: actions/upload-artifact@v7
        with:
          name: thingino-dfu-macos-universal
          path: dist/thingino-dfu-macos-universal.tar.gz

  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Emscripten
        run: |
          git clone https://github.com/emscripten-core/emsdk.git /tmp/emsdk
          /tmp/emsdk/emsdk install latest
          /tmp/emsdk/emsdk activate latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build WASM + Vite
        run: |
          source /tmp/emsdk/emsdk_env.sh
          mkdir -p web/build && cd web/build
          emcmake cmake .. -DCMAKE_BUILD_TYPE=Release
          emmake make -j$(nproc)
          cd ../../web
          npm ci
          npm run build

      - name: Package
        run: |
          mkdir -p dist
          cp -r web/dist dist/thingino-dfu-web
          cd dist && tar czf thingino-dfu-web.tar.gz thingino-dfu-web

      - uses: actions/upload-artifact@v7
        with:
          name: thingino-dfu-web
          path: dist/thingino-dfu-web.tar.gz

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/thingino-release.jks

      - name: Build APK
        working-directory: android
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          rm -rf app/src/main/assets/firmware
          mkdir -p app/src/main/assets
          cp -r ../firmware app/src/main/assets/firmware
          ./gradlew assembleRelease

      - name: Package
        run: |
          mkdir -p dist
          cp android/app/build/outputs/apk/release/app-release.apk dist/thingino-dfu-android.apk

      - uses: actions/upload-artifact@v7
        with:
          name: thingino-dfu-android
          path: dist/thingino-dfu-android.apk

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-linux-x86_64, build-linux-aarch64, build-windows, build-macos, build-android, build-web]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            artifacts/thingino-dfu-linux-x86_64/*.tar.gz \
            artifacts/thingino-dfu-linux-aarch64/*.tar.gz \
            artifacts/thingino-dfu-windows-x64/*.zip \
            artifacts/thingino-dfu-macos-universal/*.tar.gz \
            artifacts/thingino-dfu-android/*.apk \
            artifacts/thingino-dfu-web/*.tar.gz \
            --generate-notes
