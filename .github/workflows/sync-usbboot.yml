# Keep firmware/dfu/<soc>/{spl,tpl,uboot}.bin in sync with the rolling "usbboot"
# pre-release at gtxaspec/u-boot (the mainline DFU USB-boot loaders the daemon
# USB-boots during bootstrap). Runs daily and on demand; when the release's
# binaries differ from what is committed, it commits the refreshed loaders
# straight to the default branch.
#
# Security: no marketplace actions (matching .github/workflows in gtxaspec/u-boot).
# The source repo is public and pulled with the pre-installed `gh` CLI
# (`gh release download`); this repo is a plain token-authed `git clone` + push.
# Only this job is granted contents:write.
#
# Mapping: the release packs <defconfig>-u-boot.bin plus a stage1 loader per
# variant - -u-boot-spl.bin for the big-SPL SoCs, -u-boot-tpl.bin for the TPL
# SoCs (T10/T20/T21/T23/T30/T32) - where defconfig = isvp_<variant>_usbboot.
# They map to firmware/dfu/<variant>/{spl|tpl,uboot}.bin; the daemon picks the
# dir from the detected variant (libtdfu dfu_variant_dir).
#
# Change detection is by SOURCE COMMIT (firmware/dfu/.usbboot-source), not bytes:
# the binaries embed their build timestamp, so a release recreated from the same
# u-boot commit differs in bytes without differing in substance. The byte-level
# `git diff --cached --quiet` remains as a second layer.
#
# To review instead of auto-committing, replace the final step's commit+push with
# a branch push + `gh pr create` (and add pull-requests:write).

name: sync-usbboot

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # commit + push the refreshed loaders to the default branch
    env:
      GH_TOKEN: ${{ github.token }}
      SRC_REPO: gtxaspec/u-boot
      SRC_TAG: usbboot
    steps:
      - name: Check release source SHA against last sync
        run: |
          # The rolling release is RECREATED on every manual u-boot workflow run,
          # and the binaries embed their build timestamp - so a rebuild from the
          # SAME source commit yields different bytes. Byte-diffing alone would
          # commit that churn (it did: two syncs from one SHA). Gate on the
          # source commit recorded by the previous sync instead; the byte-diff
          # below stays as a second layer. To force a re-sync from an unchanged
          # SHA (e.g. toolchain change in the loaders), delete
          # firmware/dfu/.usbboot-source and dispatch the workflow.
          src_sha="$(gh release view "$SRC_TAG" -R "$SRC_REPO" --json targetCommitish --jq .targetCommitish)"
          echo "SRC_SHA=$src_sha" >> "$GITHUB_ENV"
          git clone --depth 1 --single-branch --no-tags \
            --branch "$GITHUB_REF_NAME" \
            "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}" repo
          last="$(cat repo/firmware/dfu/.usbboot-source 2>/dev/null || true)"
          if [ "$last" = "$src_sha" ]; then
            echo "Already synced from $src_sha - nothing to do."
            echo "SKIP_SYNC=true" >> "$GITHUB_ENV"
          else
            echo "Last synced: ${last:-<none>} -> new: $src_sha"
            echo "SKIP_SYNC=false" >> "$GITHUB_ENV"
          fi

      - name: Download usbboot loader assets
        if: env.SKIP_SYNC != 'true'
        run: |
          mkdir -p assets
          gh release download "$SRC_TAG" -R "$SRC_REPO" -D assets --clobber
          echo "==== downloaded ($SRC_TAG @ $SRC_SHA) ===="
          ls -l assets
          # Sanity: at least one pair, and no empty/truncated asset.
          [ "$(ls -1 assets | wc -l)" -ge 2 ] || { echo "::error::no usbboot assets downloaded"; exit 1; }
          for f in assets/*; do
            [ -s "$f" ] || { echo "::error::empty asset $f"; exit 1; }
          done

      - name: Map loaders into firmware/dfu/<soc>/
        if: env.SKIP_SYNC != 'true'
        run: |
          for f in assets/*; do
            base="$(basename "$f")"
            # stage1 is -u-boot-spl.bin on the big-SPL SoCs, -u-boot-tpl.bin on
            # the capped TPL SoCs (T10/T20/T21/T30); a SoC ships exactly one. Drop
            # the other stage1 so a SoC that changes kind doesn't keep the stale one.
            case "$base" in
              *-u-boot-spl.bin) defconfig="${base%-u-boot-spl.bin}"; out="spl.bin"; stale="tpl.bin" ;;
              *-u-boot-tpl.bin) defconfig="${base%-u-boot-tpl.bin}"; out="tpl.bin"; stale="spl.bin" ;;
              *-u-boot.bin)     defconfig="${base%-u-boot.bin}";     out="uboot.bin"; stale="" ;;
              *) echo "skip unrecognized asset: $base"; continue ;;
            esac
            family="${defconfig#isvp_}"   # t31_usbboot, t40_usbboot_ddr3
            family="${family/_usbboot/}"  # t31, t40_ddr3
            mkdir -p "repo/firmware/dfu/$family"
            cp "$f" "repo/firmware/dfu/$family/$out"
            [ -n "$stale" ] && rm -f "repo/firmware/dfu/$family/$stale"
          done
          echo "==== firmware/dfu families ===="
          ls -1 repo/firmware/dfu

      - name: Commit refreshed loaders to the default branch
        if: env.SKIP_SYNC != 'true'
        run: |
          cd repo
          echo "$SRC_SHA" > firmware/dfu/.usbboot-source
          git add -f firmware/dfu
          if git diff --cached --quiet; then
            echo "firmware/dfu already matches the usbboot release - nothing to do."
            exit 0
          fi
          changed="$(git diff --cached --name-only | sed 's#firmware/dfu/##; s#/[^/]*$##' | sort -u | tr '\n' ' ')"
          echo "Changed families: $changed"
          git -c user.name='github-actions[bot]' \
              -c user.email='41898282+github-actions[bot]@users.noreply.github.com' \
              commit -m "firmware: sync DFU loaders from gtxaspec/u-boot usbboot ($SRC_SHA)"
          git push origin "HEAD:$GITHUB_REF_NAME"
          # The synced loaders reach the published flasher on the next release
          # (Pages deploys on tags), so there is no Pages dispatch here.
