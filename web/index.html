<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>thingino · Web Flasher</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <style>
        :root { --bs-font-sans-serif: "Montserrat", sans-serif; }
        body { min-height: 100vh; display: flex; flex-direction: column; align-items: center; background: #0d1117; }
        .flasher-card { width: 100%; max-width: 720px; }
        .card-title { color: darkorange !important; }
        #log {
            height: 260px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 0.78rem;
            line-height: 1.4;
            white-space: pre-wrap;
            word-break: break-all;
            background: #010409;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 0.6rem;
        }
        #log .info { color: #c9d1d9; }
        #log .debug { color: #484f58; }
        #log .warn { color: darkorange !important; }
        #log .error { color: #f85149; }
        .device-info { font-size: 0.9rem; }
        .device-info .label { color: #8b949e; }
        .device-info .value { color: darkorange !important; font-family: monospace; }
        .progress { height: 6px; }
        .file-info { font-size: 0.85rem; color: #8b949e; }
        input[type="file"] { display: none; }
        @keyframes pulse-warn {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body class="p-3">

<div class="flasher-card">
    <!-- Header -->
    <div class="card mb-3">
        <div class="card-header d-flex align-items-center gap-2">
            <h2 class="card-title mb-0 fs-5">
                <i class="bi bi-cpu me-1"></i> Thingino Web Flasher for Ingenic
            </h2>
            <span id="status-badge" class="badge bg-secondary ms-auto">Idle</span>
        </div>

        <div id="op-warning" class="card-header bg-danger bg-opacity-10 text-danger text-center py-1 d-none" style="animation: pulse-warn 1.5s infinite;">
            <i class="bi bi-exclamation-triangle-fill me-1"></i>
            <small class="fw-600">Do not disconnect the device or navigate away during this operation</small>
        </div>

        <!-- Device Info -->
        <div class="card-body">
            <div id="device-disconnected">
                <button id="btn-connect" class="btn btn-outline-primary btn-sm" onclick="connectDevice()"
                    data-bs-toggle="tooltip" title="Connect to a device in USB cloner bootrom mode">
                    <i class="bi bi-usb-symbol me-1"></i> Connect Device
                </button>
                <span class="text-secondary ms-2 small">WebUSB requires Chrome or Edge</span>
            </div>
            <div id="device-info" class="device-info d-none">
                <div class="row g-2">
                    <div class="col-auto"><span class="label">SoC:</span> <span class="value" id="info-soc">—</span></div>
                    <div class="col-auto"><span class="label">Stage:</span> <span class="value" id="info-stage">—</span></div>
                    <div class="col-auto"><span class="label">VID:PID:</span> <span class="value" id="info-vidpid">—</span></div>
                </div>
            </div>
        </div>

        <!-- Actions -->
        <div class="card-footer">
            <div class="d-flex flex-wrap align-items-center gap-2">
                <button id="btn-bootstrap" class="btn btn-outline-secondary btn-sm" onclick="doBootstrap()" disabled
                    data-bs-toggle="tooltip" title="Boot a device to the U-Boot burner prompt">
                    <i class="bi bi-arrow-repeat me-1"></i> Bootstrap
                </button>
                <button id="btn-write" class="btn btn-outline-warning btn-sm" onclick="selectFirmware()" disabled
                    data-bs-toggle="tooltip" title="Write a firmware .bin file to the device's flash memory">
                    <i class="bi bi-download me-1"></i> Write Firmware
                </button>
                <button id="btn-read" class="btn btn-outline-info btn-sm" onclick="doRead()" disabled
                    data-bs-toggle="tooltip" title="Read the full flash contents and download as a .bin file">
                    <i class="bi bi-upload me-1"></i> Read Firmware
                </button>
            </div>
            <div class="file-info mt-1" id="file-info"></div>
            <input type="file" id="firmware-file" accept=".bin" onchange="firmwareSelected(this)">

            <div id="progress" class="mt-2 d-none">
                <div class="progress">
                    <div class="progress-bar bg-warning" id="progress-fill" role="progressbar" style="width: 0%"></div>
                </div>
                <small class="text-secondary" id="progress-label">Initializing...</small>
            </div>
        </div>
    </div>

    <!-- Log -->
    <div class="card">
        <div class="card-header d-flex align-items-center gap-2">
            <h2 class="card-title mb-0 fs-6">
                <i class="bi bi-terminal me-1"></i> Log
            </h2>
        </div>
        <div class="card-body p-2">
            <div id="log"></div>
        </div>
    </div>
</div>

<p class="mt-2 small text-center" id="version-text"><a href="https://github.com/wltechblog/thingino-cloner" target="_blank" class="text-secondary text-decoration-none">thingino-cloner</a> <span id="version-num"></span></p>

<div id="browser-warning" class="alert alert-danger flasher-card mt-3 text-center d-none">
    <i class="bi bi-exclamation-triangle me-1"></i>
    WebUSB requires <strong>HTTPS</strong> (or localhost) and <strong>Chrome</strong> or <strong>Edge</strong>.
</div>

<script src="/wasm/cloner.js"></script>
<script type="module" src="/src/main.js"></script>
</body>
</html>
